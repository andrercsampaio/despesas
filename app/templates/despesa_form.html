<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Nova Despesa</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h2>Adicionar Despesa</h2>
    {% if erro %}<p style="color:red">{{ erro }}</p>{% endif %}
    <form action="/minhas-despesas/nova" method="POST">
        <label>Descrição:</label><br>
        <input type="text" name="descricao" required minlength="3"><br><br>
        
        <label>Valor (R$):</label><br>
        <input type="number" name="valor" step="0.01" required><br><br>
        
        <label>Categoria:</label><br>
        <select name="categoria" required>
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Moradia">Moradia</option>
            <option value="Lazer">Lazer</option>
            <option value="Saúde">Saúde</option>
            <option value="Outros">Outros</option>
        </select><br><br>
        
        <button type="submit">Salvar</button>
    </form>
    <a href="/minhas-despesas">Cancelar</a>
</body>
</html>
